# Configuración para pruebas - Testcontainers o H2 en memoria
spring.datasource.url=jdbc:h2:mem:dswdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;TRACE_LEVEL_SYSTEM_OUT=0
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.maximum-pool-size=2

# Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# Security test
spring.security.user.name=admin
spring.security.user.password=admin123

# Disable actuator for tests
management.endpoints.web.exposure.include=

# H2 Console (optional for debugging)
spring.h2.console.enabled=false

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=WARN
