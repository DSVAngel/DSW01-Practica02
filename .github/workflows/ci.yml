name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-smoke:
    name: Backend - Smoke HTTP Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend without tests
        run: mvn -B -DskipTests package

      - name: Start backend with test profile
        run: |
          java -jar target/practica02-0.0.1-SNAPSHOT.jar --spring.profiles.active=test > backend.log 2>&1 &
          echo $! > backend.pid
          for _ in $(seq 1 60); do
            if : < /dev/tcp/127.0.0.1/8080; then
              exit 0
            fi
            sleep 2
          done
          cat backend.log
          exit 1

      - name: Verify backend connection
        run: curl -fsS -u admin:admin123 "http://127.0.0.1:8080/api/v1/empleados?page=0&size=1"

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi
