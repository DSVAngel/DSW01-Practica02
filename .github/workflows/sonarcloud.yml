name: SonarCloud

on:
  push:
    branches:
      - master
      - develop
      - "**"
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Compile backend for analysis
        run: mvn -B -DskipTests compile

      - name: Run backend tests
        run: mvn -B verify

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run frontend tests with coverage
        run: npm test -- --code-coverage
        working-directory: frontend

      - name: SonarCloud scan (backend + frontend)
        if: ${{ env.HAS_SONAR_TOKEN == 'true' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src/main/java,frontend/src
            -Dsonar.tests=src/test/java,frontend/src
            -Dsonar.test.inclusions=src/test/java/**/*.java,frontend/src/**/*.spec.ts
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.junit.reportPaths=target/surefire-reports
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/**/lcov.info

      - name: SonarCloud quality gate
        if: ${{ env.HAS_SONAR_TOKEN == 'true' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
