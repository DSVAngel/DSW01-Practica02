services:
  # Base de datos local (solo para desarrollo local)
  # Comentar esta sección si se usa Aiven
  bd:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-dswdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-dswdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      # Usar variables de Aiven si están definidas, sino usar BD local
      DB_URL: ${DB_URL:-jdbc:postgresql://bd:5432/${DB_NAME:-dswdb}?sslmode=disable}
      DB_USERNAME: ${DB_USERNAME:-${DB_USER:-postgres}}
      DB_PASSWORD: ${DB_PASSWORD:-${DB_PASSWORD:-postgres}}
      APP_BASIC_USER: ${APP_BASIC_USER:-admin}
      APP_BASIC_PASSWORD: ${APP_BASIC_PASSWORD:-admin123}
    expose:
      - "8080"
    depends_on:
      bd:
        condition: service_healthy
    # Descomenta si usas Aiven (no necesita esperar a BD local)
    # depends_on: []

  front:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      back:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    expose:
      - "80"
    depends_on:
      front:
        condition: service_started
      back:
        condition: service_started

volumes:
  postgres_data:
