openapi: 3.0.3
info:
  title: API CRUD Empleados
  version: 1.0.0
  description: Contrato de endpoints para gestión de empleados.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Empleado:
      type: object
      required: [clave, nombre, direccion, telefono]
      properties:
        clave:
          type: string
          maxLength: 20
          minLength: 1
        nombre:
          type: string
          maxLength: 100
          minLength: 1
        direccion:
          type: string
          maxLength: 100
          minLength: 1
        telefono:
          type: string
          maxLength: 100
          minLength: 1
        version:
          type: integer
          format: int64
          readOnly: true
    EmpleadoCreateRequest:
      allOf:
        - $ref: '#/components/schemas/Empleado'
    EmpleadoPutRequest:
      type: object
      required: [nombre, direccion, telefono]
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
    EmpleadoPatchRequest:
      type: object
      minProperties: 1
      properties:
        nombre:
          type: string
          minLength: 1
          maxLength: 100
        direccion:
          type: string
          minLength: 1
          maxLength: 100
        telefono:
          type: string
          minLength: 1
          maxLength: 100
    EmpleadoPageResponse:
      type: object
      required: [page, size, totalElements, totalPages, content]
      properties:
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          maximum: 50
        totalElements:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
        content:
          type: array
          items:
            $ref: '#/components/schemas/Empleado'
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
paths:
  /api/empleados:
    post:
      summary: Crear empleado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoCreateRequest'
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '400':
          description: Validación inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Clave duplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Listar empleados
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
        - name: size
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        '200':
          description: Página de empleados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmpleadoPageResponse'
        '400':
          description: Parámetros de paginación inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/empleados/{clave}:
    parameters:
      - name: clave
        in: path
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 20
    get:
      summary: Obtener empleado por clave
      responses:
        '200':
          description: Empleado encontrado
          headers:
            ETag:
              description: Version del recurso para control optimista
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Reemplazar empleado (actualización completa)
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoPutRequest'
      responses:
        '200':
          description: Actualizado
          headers:
            ETag:
              description: Nueva version del recurso despues de actualizar
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '400':
          description: Validación inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Conflicto de concurrencia por `If-Match` desactualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '428':
          description: Falta cabecera `If-Match`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Actualización parcial de empleado
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmpleadoPatchRequest'
      responses:
        '200':
          description: Actualizado parcialmente
          headers:
            ETag:
              description: Nueva version del recurso despues de actualizar
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Empleado'
        '400':
          description: Body inválido o sin campos actualizables
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '412':
          description: Conflicto de concurrencia por `If-Match` desactualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '428':
          description: Falta cabecera `If-Match`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Eliminar empleado (borrado físico)
      responses:
        '204':
          description: Eliminado
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
